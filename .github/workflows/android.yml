name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: .\gradlew.bat --no-daemon testDebugUnitTest

      - name: Android lint
        run: .\gradlew.bat --no-daemon lintDebug

      - name: Assemble debug APK
        run: .\gradlew.bat --no-daemon assembleDebug
